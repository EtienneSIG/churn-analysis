<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400"
     font-family="Segoe UI, Consolas, monospace">
  <!-- Background -->
  <rect width="640" height="400" fill="#1E1E1E" rx="8"/>
  <!-- Title bar -->
  <rect width="640" height="40" fill="#003A8C" rx="8"/>
  <rect y="32" width="640" height="8" fill="#003A8C"/>
  <text x="320" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="white">SQL Analytics Endpoint</text>
  <!-- Window chrome dots -->
  <circle cx="20" cy="20" r="6" fill="#E8272E"/>
  <circle cx="40" cy="20" r="6" fill="#FFC107"/>
  <circle cx="60" cy="20" r="6" fill="#107C10"/>
  <!-- Placeholder notice -->
  <rect x="20" y="56" width="600" height="280" rx="6" fill="#252526" stroke="#0078D4" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="320" y="90" text-anchor="middle" font-size="11" fill="#888">📷  PLACEHOLDER — Add real screenshot after completing the workshop</text>
  <!-- Content lines -->
  <text x="320" y="120" text-anchor="middle" font-size="11" fill="#D4D4D4">SELECT activity_tier,</text>
  <text x="320" y="140" text-anchor="middle" font-size="11" fill="#9CDCFE">  COUNT(*) AS total_customers,</text>
  <text x="320" y="160" text-anchor="middle" font-size="11" fill="#9CDCFE">  ROUND(100.0 * SUM(churned_90d)</text>
  <text x="320" y="180" text-anchor="middle" font-size="11" fill="#9CDCFE">        / COUNT(*), 2) AS churn_rate_pct</text>
  <text x="320" y="200" text-anchor="middle" font-size="11" fill="#D4D4D4">FROM customer_360</text>
  <text x="320" y="220" text-anchor="middle" font-size="11" fill="#D4D4D4">GROUP BY activity_tier</text>
  <text x="320" y="240" text-anchor="middle" font-size="11" fill="#D4D4D4">ORDER BY churn_rate_pct DESC;</text>
  <text x="320" y="260" text-anchor="middle" font-size="11" fill="#D4D4D4"></text>
  <text x="320" y="280" text-anchor="middle" font-size="11" fill="#9CDCFE">Results: Inactive 43% · Low 28% · Medium 14% · High 8%</text>
  <!-- Bottom badge -->
  <rect x="20" y="350" width="600" height="36" rx="6" fill="#003A8C"/>
  <text x="320" y="373" text-anchor="middle" font-size="11" fill="#D6E8FF">Microsoft Fabric — Contoso Banque Customer Churn Analysis Workshop</text>
</svg>
