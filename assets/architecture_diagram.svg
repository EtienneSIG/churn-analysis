<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="620" fill="#F2F2F2" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#003A8C">Contoso Banque — End-to-End Data Architecture</text>

  <!-- ─────────────────────────────────────────────
       STEP 1: Fabric Notebook (top center)
  ───────────────────────────────────────────── -->
  <rect x="300" y="60" width="300" height="80" rx="8" fill="#0078D4" stroke="#003A8C" stroke-width="1.5"/>
  <text x="450" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Fabric Notebook (PySpark)</text>
  <text x="450" y="106" text-anchor="middle" font-size="10" fill="#D6E8FF">Notebook 01 — Synthetic data generation</text>
  <text x="450" y="122" text-anchor="middle" font-size="10" fill="#D6E8FF">Notebook 02 — Transform, Segment, Analyze</text>

  <!-- Arrow: Notebook → Lakehouse -->
  <line x1="450" y1="140" x2="450" y2="168" stroke="#003A8C" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ─────────────────────────────────────────────
       STEP 2: OneLake / Lakehouse (center)
  ───────────────────────────────────────────── -->
  <rect x="170" y="170" width="560" height="200" rx="8" fill="white" stroke="#0078D4" stroke-width="2"/>
  <text x="450" y="194" text-anchor="middle" font-size="13" font-weight="bold" fill="#003A8C">OneLake / Lakehouse: ChurnAnalysisLH</text>

  <!-- Files section -->
  <rect x="190" y="205" width="230" height="150" rx="6" fill="#EFF6FF" stroke="#0078D4" stroke-width="1"/>
  <text x="305" y="225" text-anchor="middle" font-size="11" font-weight="bold" fill="#0078D4">Files/churn/raw/  (staging)</text>
  <text x="215" y="247" font-size="10" fill="#333">📄 customers</text>
  <text x="215" y="265" font-size="10" fill="#333">📄 accounts</text>
  <text x="215" y="283" font-size="10" fill="#333">📄 products</text>
  <text x="215" y="301" font-size="10" fill="#333">📄 customer_products</text>
  <text x="215" y="319" font-size="10" fill="#333">📄 transactions</text>
  <text x="305" y="344" text-anchor="middle" font-size="9" fill="#888">Parquet / any format — not directly queryable</text>

  <!-- Tables section -->
  <rect x="440" y="205" width="270" height="150" rx="6" fill="#F0FFF4" stroke="#107C10" stroke-width="1"/>
  <text x="575" y="225" text-anchor="middle" font-size="11" font-weight="bold" fill="#107C10">Tables/  (Delta — queryable)</text>
  <text x="460" y="247" font-size="10" fill="#333">🗂 customers · accounts · products</text>
  <text x="460" y="265" font-size="10" fill="#333">🗂 customer_products · transactions</text>
  <text x="460" y="290" font-size="10" fill="#0078D4">🗂 customer_360</text>
  <text x="460" y="308" font-size="10" fill="#888">  (1 row per customer — all features)</text>
  <text x="460" y="326" font-size="10" fill="#0078D4">🗂 churn_by_segment</text>
  <text x="460" y="344" font-size="10" fill="#888">  (aggregated KPIs by segment)</text>

  <!-- ─────────────────────────────────────────────
       STEP 3: Three consumers (bottom row)
  ───────────────────────────────────────────── -->

  <!-- Arrow: Lakehouse → SQL Endpoint -->
  <line x1="310" y1="370" x2="160" y2="430" stroke="#003A8C" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Arrow: Lakehouse → Power BI -->
  <line x1="450" y1="370" x2="450" y2="430" stroke="#003A8C" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Arrow: Lakehouse → Data Agent -->
  <line x1="590" y1="370" x2="740" y2="430" stroke="#003A8C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SQL Endpoint box -->
  <rect x="40" y="432" width="230" height="80" rx="8" fill="#003A8C" stroke="#001E5C" stroke-width="1.5"/>
  <text x="155" y="458" text-anchor="middle" font-size="12" font-weight="bold" fill="white">SQL Analytics Endpoint</text>
  <text x="155" y="476" text-anchor="middle" font-size="10" fill="#D6E8FF">T-SQL queries · Views</text>
  <text x="155" y="494" text-anchor="middle" font-size="10" fill="#D6E8FF">sql/01_customer_churn_views.sql</text>
  <text x="155" y="510" text-anchor="middle" font-size="10" fill="#D6E8FF">sql/02_descriptive_churn_queries.sql</text>

  <!-- Power BI box -->
  <rect x="335" y="432" width="230" height="80" rx="8" fill="#E8272E" stroke="#A31D22" stroke-width="1.5"/>
  <text x="450" y="458" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Power BI Report</text>
  <text x="450" y="476" text-anchor="middle" font-size="10" fill="#FFD0D2">Semantic model from Lakehouse</text>
  <text x="450" y="494" text-anchor="middle" font-size="10" fill="#FFD0D2">Executive Summary · Segment Deep Dive</text>
  <text x="450" y="510" text-anchor="middle" font-size="10" fill="#FFD0D2">Customer Profile · Agent Companion</text>

  <!-- Data Agent box -->
  <rect x="630" y="432" width="230" height="80" rx="8" fill="#107C10" stroke="#0A5E0A" stroke-width="1.5"/>
  <text x="745" y="458" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Fabric Data Agent</text>
  <text x="745" y="476" text-anchor="middle" font-size="10" fill="#CCFFCC">Natural-language Q&amp;A</text>
  <text x="745" y="494" text-anchor="middle" font-size="10" fill="#CCFFCC">Azure OpenAI · Auto-SQL generation</text>
  <text x="745" y="510" text-anchor="middle" font-size="10" fill="#CCFFCC">docs/data_agent_setup.md</text>

  <!-- ─────────────────────────────────────────────
       OneLake Explorer side note
  ───────────────────────────────────────────── -->
  <rect x="40" y="80" width="200" height="70" rx="8" fill="white" stroke="#0078D4" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="140" y="103" text-anchor="middle" font-size="11" font-weight="bold" fill="#0078D4">OneLake Explorer</text>
  <text x="140" y="121" text-anchor="middle" font-size="10" fill="#333">Browse OneLake in</text>
  <text x="140" y="137" text-anchor="middle" font-size="10" fill="#333">Windows File Explorer</text>
  <line x1="240" y1="115" x2="298" y2="130" stroke="#0078D4" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ─────────────────────────────────────────────
       Optional Rayfin side note
  ───────────────────────────────────────────── -->
  <rect x="660" y="80" width="200" height="70" rx="8" fill="white" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="760" y="103" text-anchor="middle" font-size="11" font-weight="bold" fill="#888">Rayfin (Optional)</text>
  <text x="760" y="121" text-anchor="middle" font-size="10" fill="#888">Advanced AI layer on</text>
  <text x="760" y="137" text-anchor="middle" font-size="10" fill="#888">top of Lakehouse data</text>
  <line x1="660" y1="115" x2="604" y2="130" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ─────────────────────────────────────────────
       Legend
  ───────────────────────────────────────────── -->
  <rect x="40" y="540" width="820" height="60" rx="6" fill="white" stroke="#D0D0D0" stroke-width="1"/>
  <text x="60" y="560" font-size="10" font-weight="bold" fill="#333">Legend:</text>
  <rect x="120" y="548" width="14" height="14" fill="#0078D4" rx="2"/>
  <text x="140" y="560" font-size="10" fill="#333">Fabric / Azure service</text>
  <rect x="260" y="548" width="14" height="14" fill="#107C10" rx="2"/>
  <text x="280" y="560" font-size="10" fill="#333">Delta tables (queryable)</text>
  <rect x="420" y="548" width="14" height="14" fill="#EFF6FF" stroke="#0078D4" stroke-width="1" rx="2"/>
  <text x="440" y="560" font-size="10" fill="#333">Files / staging area</text>
  <rect x="560" y="548" width="14" height="14" fill="white" stroke="#888" stroke-width="1" stroke-dasharray="3,2" rx="2"/>
  <text x="580" y="560" font-size="10" fill="#888">Optional component</text>

  <text x="60" y="585" font-size="9" fill="#888">All data is synthetic and fictional. "Contoso Banque" is a fictional entity used for educational purposes only.</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#003A8C"/>
    </marker>
  </defs>

</svg>
